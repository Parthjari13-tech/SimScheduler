name: Build SIM Scheduler APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.2.0)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to count total commits for versionCode

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Compute version numbers
        id: version
        run: |
          # versionCode = total number of commits (increases with every push)
          VERSION_CODE=$(git rev-list --count HEAD)

          # versionName = manual input OR auto from run number
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
          else
            # Auto version: 1.MAJOR.MINOR where MAJOR=run number/10, MINOR=run number%10
            RUN_NUM=${{ github.run_number }}
            MAJOR=$(( RUN_NUM / 10 ))
            MINOR=$(( RUN_NUM % 10 ))
            VERSION_NAME="1.${MAJOR}.${MINOR}"
          fi

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug \
            -PversionCode=${{ steps.version.outputs.VERSION_CODE }} \
            -PversionName=${{ steps.version.outputs.VERSION_NAME }}

      - name: Rename APK with version
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SIM-Scheduler-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SIM-Scheduler-v${{ steps.version.outputs.VERSION_NAME }}
          path: app/build/outputs/apk/debug/SIM-Scheduler-v${{ steps.version.outputs.VERSION_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION_NAME }}
          name: "SIM Scheduler v${{ steps.version.outputs.VERSION_NAME }} (Build #${{ github.run_number }})"
          body: |
            ## SIM Scheduler v${{ steps.version.outputs.VERSION_NAME }}

            **Build:** #${{ github.run_number }}
            **Version Code:** ${{ steps.version.outputs.VERSION_CODE }}
            **Commit:** ${{ github.sha }}
            **Date:** ${{ github.event.head_commit.timestamp }}

            ### Changes
            ${{ github.event.head_commit.message }}

            ### Install
            1. Download `SIM-Scheduler-v${{ steps.version.outputs.VERSION_NAME }}.apk`
            2. Transfer to your phone
            3. Tap to install
          files: app/build/outputs/apk/debug/SIM-Scheduler-v${{ steps.version.outputs.VERSION_NAME }}.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
